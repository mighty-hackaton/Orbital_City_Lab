name: Sync to Hugging Face Space

# Публікує чистий знімок поточного стану репозиторію в git-репозиторій
# Hugging Face Space при кожному push у GitHub. Space
# (huggingface.co/spaces/mariykart/REBoot) — це ОКРЕМИЙ git-репозиторій,
# не форк і не клон GitHub; без цього кроку зміни тут ніколи самі не
# з'являться на живому демо.
#
# Свідомо НЕ дзеркалимо повну git-історію (git push --force space HEAD:main
# з повною історією GitHub) — HF відхиляє будь-які нативні git-blob'и
# бінарних файлів ("contains binary files... use Xet/LFS"), а наша історія
# вже містить model.pkl закомічений як звичайний blob у старих комітах.
# Замість боротьби з переписуванням історії просто публікуємо ОДИН
# commit поточного робочого дерева в свіжому репо, де model.pkl від самого
# початку затрекано через Git LFS — Space не потребує нашої історії
# комітів, лише актуального стану файлів.
on:
  push:
    branches: [main]
  workflow_dispatch:  # дозволяє запустити вручну з вкладки Actions, без нового коміту

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish a clean LFS-tracked snapshot to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_PUSH }}
        run: |
          set -e
          SNAPSHOT=/tmp/space-snapshot
          rm -rf "$SNAPSHOT"
          mkdir -p "$SNAPSHOT"

          # Копіюємо робоче дерево як є, окрім .git та кеш-сміття, яке
          # взагалі не мало б жити в git (build-артефакти).
          rsync -a --exclude='.git' --exclude='__pycache__' --exclude='.ipynb_checkpoints' \
                ./ "$SNAPSHOT"/

          cd "$SNAPSHOT"
          git init -q -b main
          git config user.email "ci@orbital-city-lab.local"
          git config user.name "Orbital City Lab CI"

          git lfs install --local
          git lfs track "*.pkl"
          git add .gitattributes
          git add -A
          git commit -q -m "Sync from GitHub ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          git remote add space "https://mariykart:${HF_TOKEN}@huggingface.co/spaces/mariykart/REBoot"
          git push --force space main
